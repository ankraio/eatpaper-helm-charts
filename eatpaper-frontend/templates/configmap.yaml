apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "eatpaper-frontend.fullname" . }}-config
  labels:
    {{- include "eatpaper-frontend.labels" . | nindent 4 }}
data:
  config.js: |
    window.__RUNTIME_CONFIG__ = {
      VITE_AUTH0_DOMAIN: {{ .Values.auth0.domain | quote }},
      VITE_AUTH0_CLIENT_ID: {{ .Values.auth0.clientId | quote }},
      VITE_AUTH0_AUDIENCE: {{ .Values.auth0.audience | quote }}
    };
