{{- if and (eq .Values.storage.backend "s3") (not .Values.storage.s3.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "eatpaper-scheduler.fullname" . }}-s3
  labels:
    {{- include "eatpaper-scheduler.labels" . | nindent 4 }}
type: Opaque
stringData:
  S3_ACCESS_KEY: {{ .Values.storage.s3.accessKey | quote }}
  S3_SECRET_KEY: {{ .Values.storage.s3.secretKey | quote }}
{{- end }}
