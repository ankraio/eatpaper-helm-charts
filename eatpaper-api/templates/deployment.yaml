apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eatpaper-api.fullname" . }}
  labels:
    {{- include "eatpaper-api.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      {{- include "eatpaper-api.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "eatpaper-api.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.image.pullSecrets | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "eatpaper-api.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ .Values.image.repository }}:{{ include "eatpaper-api.imageTag" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: {{ .Values.service.name }}
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- if eq .Values.storage.backend "local" }}
          volumeMounts:
            - name: receipt-storage
              mountPath: {{ .Values.storage.localPath }}
          {{- end }}
          env:
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.secretName }}
                  key: username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.secretName }}
                  key: password
            {{- if eq .Values.storage.backend "s3" }}
            - name: S3_BUCKET
              value: {{ .Values.storage.s3.bucket | quote }}
            - name: S3_ENDPOINT
              value: {{ .Values.storage.s3.endpoint | quote }}
            - name: S3_REGION
              value: {{ .Values.storage.s3.region | quote }}
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.storage.s3.existingSecret | default (printf "%s-s3" (include "eatpaper-api.fullname" .)) }}
                  key: S3_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.storage.s3.existingSecret | default (printf "%s-s3" (include "eatpaper-api.fullname" .)) }}
                  key: S3_SECRET_KEY
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "eatpaper-api.fullname" . }}
            - secretRef:
                name: {{ .Values.smtp.secretName }}
            {{- if .Values.auth0.mgmtSecretName }}
            - secretRef:
                name: {{ .Values.auth0.mgmtSecretName }}
            {{- end }}
          startupProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            failureThreshold: 6
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            periodSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- if eq .Values.storage.backend "local" }}
      volumes:
        - name: receipt-storage
          {{- if .Values.storage.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.storage.persistence.existingClaim | default (printf "%s-receipts" (include "eatpaper-api.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
