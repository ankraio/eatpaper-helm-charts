apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "eatpaper-api.fullname" . }}
  labels:
    {{- include "eatpaper-api.labels" . | nindent 4 }}
data:
  APP_MODE: {{ .Values.mode | quote }}
  APP_ENV: "production"
  APP_PORT: {{ .Values.service.port | quote }}
  LOG_LEVEL: {{ .Values.log_level | quote }}
  DATABASE_NAME: {{ .Values.database.name | quote }}
  DATABASE_HOST: {{ .Values.database.readWriteEndpoint | quote }}
  DATABASE_PORT: {{ .Values.database.port | quote }}
  READ_WRITE_DATABASE_HOST: {{ .Values.database.readWriteEndpoint | quote }}
  READ_DATABASE_HOST: {{ .Values.database.readEndpoint | quote }}
  STORAGE_BACKEND: {{ .Values.storage.backend | quote }}
  STORAGE_LOCAL_PATH: {{ .Values.storage.localPath | quote }}
  AUTH0_DOMAIN: {{ .Values.auth0.domain | quote }}
  AUTH0_API_AUDIENCE: {{ .Values.auth0.api_audience | quote }}
  FRONTEND_BASE_URL: {{ .Values.frontend_base_url | quote }}
  CORS_ALLOWED_ORIGINS: {{ .Values.cors_allowed_origins | quote }}
  CURRENCY_API_URL: {{ .Values.currency_api_url | quote }}
